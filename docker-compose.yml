services:
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - factu_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  odoo:
    build:
      context: ./docker
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    ports:
      - "8069:8069"
    volumes:
      - .:/mnt/extra-addons:rw
      - factu_odoo_data:/var/lib/odoo
      - ./docker/odoo.conf:/etc/odoo/odoo.conf:ro
    command: >
      odoo
      --config=/etc/odoo/odoo.conf
      --logfile=-

volumes:
  factu_pgdata:
  factu_odoo_data:
